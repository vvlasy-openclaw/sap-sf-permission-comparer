<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP SF Permission Comparer — T3 vs PROD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f6fa; color: #2c3e50; line-height: 1.5; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Header */
  header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 32px; border-radius: 12px; margin-bottom: 24px; }
  header h1 { font-size: 1.6em; margin-bottom: 8px; }
  header p { opacity: 0.85; font-size: 0.9em; }

  /* Upload area */
  .upload-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media (max-width: 700px) { .upload-container { grid-template-columns: 1fr; } }
  .upload-box { background: white; border: 2px dashed #bdc3c7; border-radius: 10px; padding: 40px 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-box:hover, .upload-box.dragover { border-color: #3498db; background: #eaf4fc; }
  .upload-box.has-file { border-color: #27ae60; border-style: solid; background: #e8f8f0; }
  .upload-box h3 { font-size: 1.05em; margin-bottom: 6px; }
  .upload-box p { font-size: 0.85em; color: #7f8c8d; }
  .upload-box .filename { font-size: 0.85em; color: #27ae60; font-weight: 600; margin-top: 8px; word-break: break-all; }
  .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2em; margin-bottom: 8px; color: #bdc3c7; }
  .upload-box.has-file .upload-icon { color: #27ae60; }

  /* Compare button */
  .actions { text-align: center; margin-bottom: 28px; }
  #compareBtn { padding: 14px 48px; font-size: 1.05em; font-weight: 600; background: linear-gradient(135deg, #2c3e50, #3498db); color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
  #compareBtn:hover { opacity: 0.9; }
  #compareBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  #progress { text-align: center; margin-bottom: 20px; font-size: 0.95em; color: #555; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ddd; border-top-color: #3498db; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Report styles (matches generate_html_report) */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; border-top: 4px solid #bdc3c7; }
  .card .num { font-size: 2.2em; font-weight: 700; }
  .card .label { font-size: 0.85em; color: #7f8c8d; margin-top: 4px; }
  .section { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow: hidden; }
  .section-header { padding: 16px 20px; font-weight: 600; font-size: 1.05em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .section-header .badge { background: rgba(255,255,255,0.3); padding: 2px 10px; border-radius: 12px; font-size: 0.85em; }
  .section-body { padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  th { background: #f8f9fa; padding: 10px 16px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; }
  td { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:hover td { background: #fafbfc; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 500; }
  .tag-t3 { background: #fdecea; color: #c0392b; }
  .tag-prod { background: #e8f8f0; color: #27ae60; }
  .tag-both { background: #fef5e7; color: #d35400; }
  .raw-section { padding: 16px 20px; }
  .raw-section h3 { margin-bottom: 10px; font-size: 0.95em; color: #555; }
  .raw-line { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.82em; padding: 3px 8px; margin: 2px 0; border-radius: 4px; }
  .raw-t3 { background: #fdecea; }
  .raw-prod { background: #e8f8f0; }
  .identical { text-align: center; padding: 40px; color: #27ae60; font-size: 1.2em; }
  details summary { cursor: pointer; padding: 8px 0; }
  .filter-bar { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-bar label { font-weight: 600; font-size: 0.9em; color: #555; white-space: nowrap; }
  .filter-bar input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
  .filter-bar input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
  .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #f8f9fa; cursor: pointer; font-size: 0.82em; color: #555; transition: all 0.15s; }
  .filter-btn:hover { background: #e8e8e8; }
  .filter-btn.active { background: #3498db; color: white; border-color: #3498db; }
  .hidden-row { display: none; }
  .filter-info { font-size: 0.82em; color: #95a5a6; margin-left: auto; white-space: nowrap; }

  /* Report meta */
  .report-meta { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px 20px; margin-bottom: 20px; }
  .report-meta .meta-row { display: flex; gap: 24px; flex-wrap: wrap; font-size: 0.9em; color: #555; }
  .report-meta .meta-row span { white-space: nowrap; }
  .report-meta .meta-row strong { color: #2c3e50; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SAP SuccessFactors Permission Comparer</h1>
    <p>Upload T3 (Pre-Production) and PROD (Production) permission PDFs to compare them client-side.</p>
  </header>

  <div class="upload-container">
    <div class="upload-box" id="t3Box">
      <div class="upload-icon">&#128196;</div>
      <h3>T3 (Pre-Production)</h3>
      <p>Drop PDF here or click to browse</p>
      <div class="filename" id="t3Name"></div>
      <input type="file" id="t3Input" accept=".pdf">
    </div>
    <div class="upload-box" id="prodBox">
      <div class="upload-icon">&#128196;</div>
      <h3>PROD (Production)</h3>
      <p>Drop PDF here or click to browse</p>
      <div class="filename" id="prodName"></div>
      <input type="file" id="prodInput" accept=".pdf">
    </div>
  </div>

  <div class="actions">
    <button id="compareBtn" disabled>Compare Permissions</button>
  </div>

  <div id="progress"></div>
  <div id="report"></div>
</div>

<script type="module">
// ============================================================================
// PDF.js setup
// ============================================================================
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

// ============================================================================
// Upload UI
// ============================================================================
let t3File = null, prodFile = null;

function setupUploadBox(boxId, inputId, nameId, setter) {
  const box = document.getElementById(boxId);
  const input = document.getElementById(inputId);
  const nameEl = document.getElementById(nameId);

  input.addEventListener('change', () => {
    if (input.files.length > 0) {
      setter(input.files[0]);
      nameEl.textContent = input.files[0].name;
      box.classList.add('has-file');
    }
  });

  box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('dragover'); });
  box.addEventListener('dragleave', () => box.classList.remove('dragover'));
  box.addEventListener('drop', e => {
    e.preventDefault();
    box.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      setter(file);
      nameEl.textContent = file.name;
      box.classList.add('has-file');
      // sync the input
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
    }
  });
}

setupUploadBox('t3Box', 't3Input', 't3Name', f => { t3File = f; updateBtn(); });
setupUploadBox('prodBox', 'prodInput', 'prodName', f => { prodFile = f; updateBtn(); });

function updateBtn() {
  document.getElementById('compareBtn').disabled = !(t3File && prodFile);
}

document.getElementById('compareBtn').addEventListener('click', runComparison);

// ============================================================================
// Progress helper
// ============================================================================
function setProgress(msg) {
  const el = document.getElementById('progress');
  if (msg) {
    el.innerHTML = '<span class="spinner"></span> ' + htmlEscape(msg);
  } else {
    el.innerHTML = '';
  }
}

// ============================================================================
// PDF TEXT EXTRACTION
// ============================================================================
async function extractTextFromPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Reconstruct lines from text items using transform y-coordinates
    const items = content.items.filter(it => it.str !== undefined);
    if (items.length === 0) continue;

    // Group items by their y-coordinate (rounded to handle slight variations)
    const lineMap = new Map();
    for (const item of items) {
      const y = Math.round(item.transform[5] * 10) / 10; // round to 0.1
      if (!lineMap.has(y)) lineMap.set(y, []);
      lineMap.get(y).push(item);
    }

    // Sort lines top-to-bottom (higher y = higher on page in PDF coords)
    const sortedYs = [...lineMap.keys()].sort((a, b) => b - a);
    for (const y of sortedYs) {
      const lineItems = lineMap.get(y).sort((a, b) => a.transform[4] - b.transform[4]);
      const lineText = lineItems.map(it => it.str).join(' ');
      pages.push(lineText);
    }
  }

  // Clean: filter out page-break noise
  const cleaned = [];
  for (const raw of pages) {
    const stripped = raw.trim();
    if (!stripped) continue;
    // Skip URL lines
    if (stripped.startsWith('http://') || stripped.startsWith('https://')) continue;
    // Skip page header lines like "3/12/26, 2:19 PM View Role..."
    if (/^\d+\/\d+\/\d+,\s+\d+:\d+\s+(AM|PM)\s+/.test(stripped)) continue;
    cleaned.push(stripped);
  }

  return cleaned.join('\n');
}

// ============================================================================
// SECTION PARSING
// ============================================================================
const SECTION_HEADERS = [
  "Role Name",
  "Role Description",
  "Permission settings",
  "User Type",
  "RBP-Only",
  "Last Modified By",
  "Last Modified Date",
  "Employee Data",
  "ESS",
  "Miscellaneous Permissions",
  "Manage Position",
  "Reports Permission",
  "Manage User",
  "Administrator Permissions",
  "Workflow",
  "MDF Foundation Objects",
  "Metadata Framework",
  "Employee Central Effective Dated Entities",
  "Employee Central Object-Level Permissions",
  "Employee Central Import and Export Data Permissions",
];

const PERM_KEYWORDS_RE = /\b(View|Edit|Insert|Delete|Import|Export|Approve|Create|Correct|None|Admin|Import\/Export|View Current|View History)\b/;

const COMPOUND_PERMS_SET = new Set(["View Current", "View History", "Edit/Insert", "Import/Export"]);
const SINGLE_PERMS_SET = new Set(["View", "Edit", "Insert", "Delete", "Import", "Export",
                                   "Approve", "Create", "Correct", "None", "Admin", "Yes", "No"]);

function isPurePermLine(text) {
  let clean = text.replace(/[\s\u2605]*$/, ''); // rstrip star
  // Strip compound perms
  for (const cp of COMPOUND_PERMS_SET) {
    while (clean.includes(cp)) {
      clean = clean.replace(cp, ' ');
    }
  }
  const parts = clean.split('|').map(p => p.trim());
  for (const part of parts) {
    const words = part.split(/\s+/).filter(w => w);
    for (const w of words) {
      if (!SINGLE_PERMS_SET.has(w)) return false;
    }
  }
  return text.trim().length > 0;
}

function parseSections(text) {
  const lines = text.split('\n');
  const sections = new Map();
  let currentSection = '__HEADER__';
  let currentSubsection = '';
  sections.set(currentSection, []);

  for (const line of lines) {
    const stripped = line.trim();
    if (!stripped) continue;

    // Stop at Assignments
    if (stripped.toLowerCase().startsWith('assignments')) break;

    // Check for known section header
    let matchedSection = null;
    for (const header of SECTION_HEADERS) {
      if (stripped.toLowerCase().startsWith(header.toLowerCase())) {
        matchedSection = header;
        break;
      }
    }

    if (matchedSection) {
      currentSection = matchedSection;
      currentSubsection = '';
      if (!sections.has(currentSection)) sections.set(currentSection, []);
      let remainder = stripped.slice(matchedSection.length).replace(/^[:\s]+/, '').trim();
      if (remainder) {
        sections.get(currentSection).push(remainder);
      }
      continue;
    }

    // Check subsection header (ends with dagger or double-dagger, no perms)
    const clean = stripped.replace(/[\s\u2020\u205C\u2605]*$/, ''); // rstrip space/dagger/double-dagger/star
    if ((stripped.endsWith('\u2020') || stripped.endsWith('\u205C')) && !PERM_KEYWORDS_RE.test(stripped)) {
      currentSubsection = clean;
      continue;
    }

    // Build line
    let addLine;
    if (isPurePermLine(stripped)) {
      addLine = stripped;
    } else if (currentSubsection) {
      addLine = currentSubsection + ' > ' + stripped;
    } else {
      addLine = stripped;
    }

    // Continuation: if previous line ended with |
    if (!sections.has(currentSection)) sections.set(currentSection, []);
    const secLines = sections.get(currentSection);
    if (secLines.length > 0 && secLines[secLines.length - 1].trimEnd().endsWith('|')) {
      // Strip duplicate subsection prefix
      let toAppend = stripped;
      if (currentSubsection && stripped.startsWith(currentSubsection + ' > ')) {
        toAppend = stripped.slice(currentSubsection.length + 3);
      }
      secLines[secLines.length - 1] = secLines[secLines.length - 1].trimEnd() + ' ' + toAppend;
    } else {
      secLines.push(addLine);
    }
  }

  return sections;
}

// ============================================================================
// PERMISSION LINE PARSING
// ============================================================================
const COMPOUND_PERMS = ["View Current", "View History", "Edit/Insert", "Import/Export"];

function hasPermSyntax(text) {
  if (text.includes('|')) return true;
  const clean = text.replace(/[\s\u2605]*$/, '');
  const words = clean.split(/\s+/).filter(w => w);
  if (!words.length) return false;
  for (const cp of COMPOUND_PERMS) {
    if (clean.endsWith(cp)) return true;
  }
  return SINGLE_PERMS_SET.has(words[words.length - 1]);
}

function extractNameAndPerms(text) {
  text = text.replace(/[\s\u2605]*$/, ''); // rstrip star

  if (!hasPermSyntax(text)) {
    return [text.trim(), new Set(['Enabled'])];
  }

  const granted = new Set();
  let remaining = text;

  // Extract compound permissions
  for (const cp of COMPOUND_PERMS) {
    while (remaining.includes(cp)) {
      granted.add(cp);
      remaining = remaining.replace(cp, ' ');
    }
  }

  // Split by | and extract single perms
  const parts = remaining.split('|').map(p => p.trim());
  const nameParts = [];
  for (const part of parts) {
    const words = part.split(/\s+/).filter(w => w);
    const partNameWords = [];
    for (const w of words) {
      if (SINGLE_PERMS_SET.has(w)) {
        granted.add(w);
      } else {
        partNameWords.push(w);
      }
    }
    if (partNameWords.length) nameParts.push(partNameWords.join(' '));
  }

  return [nameParts.join(' ').trim(), granted];
}

function parsePermissionLines(lines) {
  const permissions = new Map(); // ordered by insertion
  const keyOrder = [];

  function setPermission(name, val) {
    if (!permissions.has(name)) keyOrder.push(name);
    permissions.set(name, val);
  }

  function deletePermission(name) {
    permissions.delete(name);
    const idx = keyOrder.indexOf(name);
    if (idx >= 0) keyOrder.splice(idx, 1);
  }

  let lastName = null;

  for (const line of lines) {
    const stripped = line.trim();
    if (!stripped) continue;

    // Check for parenthetical ID continuation
    let lineNoPrefix = stripped;
    if (stripped.includes('>')) {
      lineNoPrefix = stripped.split('>').slice(1).join('>').trim();
    }
    const idMatch = lineNoPrefix.match(/\(([A-Za-z0-9\-]*_[A-Za-z0-9_\-]*)\)\s*$/);
    if (idMatch && !hasPermSyntax(stripped) && lastName !== null) {
      const suffix = lineNoPrefix.trim();
      const prevPerms = permissions.get(lastName);
      deletePermission(lastName);
      const newName = lastName + ' ' + suffix;
      setPermission(newName, prevPerms);
      lastName = newName;
      continue;
    }

    let [name, granted] = extractNameAndPerms(stripped);

    if (!name && granted.size === 0) continue;

    // Pure permission continuation
    if (!name && granted.size > 0 && lastName !== null) {
      const prev = permissions.get(lastName);
      for (const g of granted) prev.add(g);
      continue;
    }

    // Name fragment continuation
    if (setsEqual(granted, new Set(['Enabled'])) && lastName !== null) {
      const prevPerms = permissions.get(lastName);
      const isNameFragment = !name.includes('>') && name.length > 0 && !name[0].match(/[A-Z]/);
      if (setsEqual(prevPerms, new Set(['Enabled'])) && isNameFragment) {
        deletePermission(lastName);
        const newName = lastName + ' ' + name;
        setPermission(newName, prevPerms);
        lastName = newName;
        continue;
      }
    }

    if (!name) name = stripped;

    // Handle duplicates
    const baseName = name;
    let counter = 1;
    while (permissions.has(name)) {
      counter++;
      name = baseName + ' (#' + counter + ')';
    }
    setPermission(name, granted);
    lastName = name;
  }

  return { permissions, keyOrder };
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const v of a) if (!b.has(v)) return false;
  return true;
}

// ============================================================================
// COMPARISON ENGINE
// ============================================================================
function comparePermissions(t3Sections, prodSections) {
  const differences = [];
  const skipSections = new Set(['__HEADER__', 'User Type', 'Role Name', 'Role Description',
                                'RBP-Only', 'Last Modified By', 'Last Modified Date']);

  // Ordered union of section keys
  const allSections = [];
  const seen = new Set();
  for (const k of t3Sections.keys()) { if (!seen.has(k)) { allSections.push(k); seen.add(k); } }
  for (const k of prodSections.keys()) { if (!seen.has(k)) { allSections.push(k); seen.add(k); } }

  for (const section of allSections) {
    if (skipSections.has(section)) continue;

    const t3Lines = t3Sections.get(section) || null;
    const prodLines = prodSections.get(section) || null;

    if (t3Lines === null && prodLines !== null) {
      differences.push({
        section, item: '(entire section)', type: 'SECTION_MISSING_IN_T3',
        t3Value: 'N/A',
        prodValue: prodLines.slice(0, 5).join('; ') + (prodLines.length > 5 ? '...' : '')
      });
      continue;
    }
    if (prodLines === null && t3Lines !== null) {
      differences.push({
        section, item: '(entire section)', type: 'SECTION_MISSING_IN_PROD',
        t3Value: t3Lines.slice(0, 5).join('; ') + (t3Lines.length > 5 ? '...' : ''),
        prodValue: 'N/A'
      });
      continue;
    }

    const t3Parsed = parsePermissionLines(t3Lines);
    const prodParsed = parsePermissionLines(prodLines);

    // Ordered union of item keys
    const allItems = [];
    const seenItems = new Set();
    for (const k of t3Parsed.keyOrder) { if (!seenItems.has(k)) { allItems.push(k); seenItems.add(k); } }
    for (const k of prodParsed.keyOrder) { if (!seenItems.has(k)) { allItems.push(k); seenItems.add(k); } }

    for (const item of allItems) {
      const t3Val = t3Parsed.permissions.get(item) || null;
      const prodVal = prodParsed.permissions.get(item) || null;

      if (t3Val !== null && prodVal === null) {
        differences.push({
          section, item, type: 'MISSING_IN_PROD',
          t3Value: t3Val.size ? [...t3Val].sort().join(', ') : '(present, no flags)',
          prodValue: 'N/A'
        });
      } else if (prodVal !== null && t3Val === null) {
        differences.push({
          section, item, type: 'MISSING_IN_T3',
          t3Value: 'N/A',
          prodValue: prodVal.size ? [...prodVal].sort().join(', ') : '(present, no flags)'
        });
      } else if (t3Val !== null && prodVal !== null && !setsEqual(t3Val, prodVal)) {
        differences.push({
          section, item, type: 'PERMISSION_MISMATCH',
          t3Value: t3Val.size ? [...t3Val].sort().join(', ') : '(none)',
          prodValue: prodVal.size ? [...prodVal].sort().join(', ') : '(none)'
        });
      }
    }
  }

  return differences;
}

// ============================================================================
// RAW LINE COMPARISON
// ============================================================================
function compareRawLines(t3Text, prodText) {
  const t3Set = new Set(t3Text.split('\n').map(l => l.trim()).filter(l => l));
  const prodSet = new Set(prodText.split('\n').map(l => l.trim()).filter(l => l));

  const onlyInT3 = [...t3Set].filter(l => !prodSet.has(l)).sort();
  const onlyInProd = [...prodSet].filter(l => !t3Set.has(l)).sort();

  return { onlyInT3, onlyInProd };
}

// ============================================================================
// HTML HELPERS
// ============================================================================
function htmlEscape(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;')
             .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================================================
// REPORT RENDERING
// ============================================================================
function renderReport(differences, rawDiff, t3FileName, prodFileName) {
  const timestamp = new Date().toLocaleString();

  const typeLabels = {
    'PERMISSION_MISMATCH':     ['Permission Mismatches', '#e67e22', 'Different rights granted between T3 and PROD'],
    'MISSING_IN_PROD':         ['Only in T3', '#e74c3c', 'Items present in T3 but missing in PROD'],
    'MISSING_IN_T3':           ['Only in PROD', '#2ecc71', 'Items present in PROD but missing in T3'],
    'SECTION_MISSING_IN_PROD': ['Sections only in T3', '#e74c3c', 'Entire sections missing in PROD'],
    'SECTION_MISSING_IN_T3':   ['Sections only in PROD', '#2ecc71', 'Entire sections missing in T3'],
  };

  const counts = {};
  for (const dt of Object.keys(typeLabels)) {
    counts[dt] = differences.filter(d => d.type === dt).length;
  }

  const onlyT3 = rawDiff.onlyInT3;
  const onlyProd = rawDiff.onlyInProd;

  let html = '';

  // Meta
  html += `<div class="report-meta"><div class="meta-row">
    <span><strong>T3:</strong> ${htmlEscape(t3FileName)}</span>
    <span><strong>PROD:</strong> ${htmlEscape(prodFileName)}</span>
    <span><strong>Generated:</strong> ${htmlEscape(timestamp)}</span>
  </div></div>`;

  // Summary cards
  html += `<div class="summary">
    <div class="card" style="border-top-color:#3498db;"><div class="num" id="cardTotal">${differences.length}</div><div class="label">Total Differences</div></div>
    <div class="card" style="border-top-color:#e67e22;"><div class="num" id="cardMismatch">${counts['PERMISSION_MISMATCH'] || 0}</div><div class="label">Mismatches</div></div>
    <div class="card" style="border-top-color:#e74c3c;"><div class="num" id="cardT3">${(counts['MISSING_IN_PROD'] || 0) + (counts['SECTION_MISSING_IN_PROD'] || 0)}</div><div class="label">Only in T3</div></div>
    <div class="card" style="border-top-color:#2ecc71;"><div class="num" id="cardProd">${(counts['MISSING_IN_T3'] || 0) + (counts['SECTION_MISSING_IN_T3'] || 0)}</div><div class="label">Only in PROD</div></div>
  </div>`;

  // Filter bar
  html += `<div class="filter-bar">
    <label>Filter rows:</label>
    <input type="text" id="filterInput" placeholder="Type to exclude rows containing this text...">
    <button class="filter-btn" data-filter="_SD)" onclick="togglePreset(this)">Hide _SD)</button>
    <button class="filter-btn" onclick="clearFilter()">Clear</button>
    <span class="filter-info" id="filterInfo"></span>
  </div>`;

  if (differences.length === 0) {
    html += '<div class="identical">No differences found &mdash; permissions are identical.</div>';
  } else {
    const typeOrder = ['PERMISSION_MISMATCH', 'MISSING_IN_PROD', 'MISSING_IN_T3', 'SECTION_MISSING_IN_PROD', 'SECTION_MISSING_IN_T3'];
    for (const diffType of typeOrder) {
      const typeDiffs = differences.filter(d => d.type === diffType);
      if (!typeDiffs.length) continue;

      const [label, color, desc] = typeLabels[diffType];

      html += `<div class="section">
        <div class="section-header" style="background:${color};color:white;">
          ${htmlEscape(label)}: ${htmlEscape(desc)}
          <span class="badge">${typeDiffs.length}</span>
        </div>
        <div class="section-body"><table>
          <tr><th>#</th><th>Section</th><th>Item</th><th>T3</th><th>PROD</th></tr>`;

      typeDiffs.forEach((diff, i) => {
        html += `<tr>
          <td>${i + 1}</td>
          <td>${htmlEscape(diff.section)}</td>
          <td>${htmlEscape(diff.item)}</td>
          <td><span class="tag tag-t3">${htmlEscape(diff.t3Value)}</span></td>
          <td><span class="tag tag-prod">${htmlEscape(diff.prodValue)}</span></td>
        </tr>`;
      });

      html += '</table></div></div>';
    }
  }

  // Raw differences
  if (onlyT3.length || onlyProd.length) {
    html += `<div class="section">
      <div class="section-header" style="background:#95a5a6;color:white;">
        Raw Line Differences (Supplementary)
        <span class="badge">${onlyT3.length + onlyProd.length}</span>
      </div>
      <div class="raw-section">`;

    if (onlyT3.length) {
      html += `<details><summary><strong>Lines only in T3 (${onlyT3.length})</strong></summary>`;
      for (const line of onlyT3) {
        html += `<div class="raw-line raw-t3">${htmlEscape(line)}</div>`;
      }
      html += '</details>';
    }
    if (onlyProd.length) {
      html += `<details><summary><strong>Lines only in PROD (${onlyProd.length})</strong></summary>`;
      for (const line of onlyProd) {
        html += `<div class="raw-line raw-prod">${htmlEscape(line)}</div>`;
      }
      html += '</details>';
    }

    html += '</div></div>';
  }

  return html;
}

// ============================================================================
// MAIN COMPARISON FLOW
// ============================================================================
async function runComparison() {
  const btn = document.getElementById('compareBtn');
  const reportEl = document.getElementById('report');
  btn.disabled = true;
  reportEl.innerHTML = '';

  try {
    setProgress('Extracting text from T3 PDF...');
    const t3Text = await extractTextFromPdf(t3File);

    setProgress('Extracting text from PROD PDF...');
    const prodText = await extractTextFromPdf(prodFile);

    setProgress('Parsing sections...');
    await new Promise(r => setTimeout(r, 0)); // yield to render
    const t3Sections = parseSections(t3Text);
    const prodSections = parseSections(prodText);

    setProgress('Comparing permissions...');
    await new Promise(r => setTimeout(r, 0));
    const differences = comparePermissions(t3Sections, prodSections);
    const rawDiff = compareRawLines(t3Text, prodText);

    setProgress('Generating report...');
    await new Promise(r => setTimeout(r, 0));
    const reportHtml = renderReport(differences, rawDiff, t3File.name, prodFile.name);
    reportEl.innerHTML = reportHtml;

    setProgress('');
    attachFilterLogic();
  } catch (err) {
    setProgress('');
    reportEl.innerHTML = `<div class="section" style="padding:24px;color:#e74c3c;">
      <strong>Error:</strong> ${htmlEscape(err.message)}<br>
      <pre style="margin-top:8px;font-size:0.85em;color:#555;">${htmlEscape(err.stack || '')}</pre>
    </div>`;
  } finally {
    btn.disabled = false;
  }
}

// ============================================================================
// FILTER LOGIC (attached after report render)
// ============================================================================
function attachFilterLogic() {
  const filterInput = document.getElementById('filterInput');
  const filterInfo = document.getElementById('filterInfo');
  if (!filterInput) return;

  filterInput.addEventListener('input', applyFilter);
}

// These are global so the inline onclick handlers work
window.applyFilter = function() {
  const filterInput = document.getElementById('filterInput');
  const filterInfo = document.getElementById('filterInfo');
  if (!filterInput) return;

  const term = filterInput.value.trim().toLowerCase();
  const rows = document.querySelectorAll('.section-body table tr:not(:first-child)');
  let hidden = 0, total = 0;

  rows.forEach(row => {
    total++;
    const text = row.textContent.toLowerCase();
    if (term && text.includes(term)) {
      row.classList.add('hidden-row');
      hidden++;
    } else {
      row.classList.remove('hidden-row');
    }
  });

  // Update badge counts and summary cards
  let totalVisible = 0, mismatchVisible = 0, t3OnlyVisible = 0, prodOnlyVisible = 0;
  document.querySelectorAll('.section').forEach(sec => {
    const tbl = sec.querySelector('table');
    if (!tbl) return;
    const visible = tbl.querySelectorAll('tr:not(:first-child):not(.hidden-row)').length;
    const badge = sec.querySelector('.badge');
    if (badge) badge.textContent = visible;
    const hdr = sec.querySelector('.section-header');
    if (!hdr) return;
    const txt = hdr.textContent.toLowerCase();
    totalVisible += visible;
    if (txt.includes('mismatch')) mismatchVisible += visible;
    else if (txt.includes('only in t3')) t3OnlyVisible += visible;
    else if (txt.includes('only in prod')) prodOnlyVisible += visible;
  });

  const ct = document.getElementById('cardTotal');
  const cm = document.getElementById('cardMismatch');
  const c3 = document.getElementById('cardT3');
  const cp = document.getElementById('cardProd');
  if (ct) ct.textContent = totalVisible;
  if (cm) cm.textContent = mismatchVisible;
  if (c3) c3.textContent = t3OnlyVisible;
  if (cp) cp.textContent = prodOnlyVisible;

  if (filterInfo) filterInfo.textContent = term ? `Hiding ${hidden} of ${total} rows` : '';
};

window.togglePreset = function(btn) {
  const filter = btn.dataset.filter;
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    document.getElementById('filterInput').value = '';
  } else {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('filterInput').value = filter;
  }
  window.applyFilter();
};

window.clearFilter = function() {
  document.getElementById('filterInput').value = '';
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
  window.applyFilter();
};
</script>
