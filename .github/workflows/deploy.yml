name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server.py'
      - 'comparer.py'
      - 'frontend/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

env:
  IMAGE: ghcr.io/vvlasy-openclaw/sap-sf-permission-comparer

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Deploy to K8s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl set image deployment/sap-comparer sap-comparer=${{ env.IMAGE }}:sha-${{ github.sha }} -n openclaw-vvlasy
          kubectl rollout status deployment/sap-comparer -n openclaw-vvlasy --timeout=120s
