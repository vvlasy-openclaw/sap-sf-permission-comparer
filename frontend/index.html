<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP SF Permission Comparer — T3 vs PROD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f6fa; color: #2c3e50; line-height: 1.5; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Header */
  header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 32px; border-radius: 12px; margin-bottom: 24px; position: relative; }
  header h1 { font-size: 1.6em; margin-bottom: 8px; }
  header p { opacity: 0.85; font-size: 0.9em; }

  /* Upload area */
  .upload-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media (max-width: 700px) { .upload-container { grid-template-columns: 1fr; } }
  .upload-box { background: white; border: 2px dashed #bdc3c7; border-radius: 10px; padding: 40px 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-box:hover, .upload-box.dragover { border-color: #3498db; background: #eaf4fc; }
  .upload-box.has-file { border-color: #27ae60; border-style: solid; background: #e8f8f0; }
  .upload-box h3 { font-size: 1.05em; margin-bottom: 6px; }
  .upload-box p { font-size: 0.85em; color: #7f8c8d; }
  .upload-box .filename { font-size: 0.85em; color: #27ae60; font-weight: 600; margin-top: 8px; word-break: break-all; }
  .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2em; margin-bottom: 8px; color: #bdc3c7; }
  .upload-box.has-file .upload-icon { color: #27ae60; }

  /* Compare button */
  .actions { text-align: center; margin-bottom: 28px; }
  #compareBtn { padding: 14px 48px; font-size: 1.05em; font-weight: 600; background: linear-gradient(135deg, #2c3e50, #3498db); color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
  #compareBtn:hover { opacity: 0.9; }
  #compareBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  #progress { text-align: center; margin-bottom: 20px; font-size: 0.95em; color: #555; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ddd; border-top-color: #3498db; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Report styles */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; border-top: 4px solid #bdc3c7; }
  .card .num { font-size: 2.2em; font-weight: 700; }
  .card .label { font-size: 0.85em; color: #7f8c8d; margin-top: 4px; }
  .section { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow: hidden; }
  .section-header { padding: 16px 20px; font-weight: 600; font-size: 1.05em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .section-header .badge { background: rgba(255,255,255,0.3); padding: 2px 10px; border-radius: 12px; font-size: 0.85em; }
  .section-body { padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  th { background: #f8f9fa; padding: 10px 16px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; }
  td { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:hover td { background: #fafbfc; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 500; }
  .tag-t3 { background: #fdecea; color: #c0392b; }
  .tag-prod { background: #e8f8f0; color: #27ae60; }
  .tag-both { background: #fef5e7; color: #d35400; }
  .raw-section { padding: 16px 20px; }
  .raw-section h3 { margin-bottom: 10px; font-size: 0.95em; color: #555; }
  .raw-line { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.82em; padding: 3px 8px; margin: 2px 0; border-radius: 4px; }
  .raw-t3 { background: #fdecea; }
  .raw-prod { background: #e8f8f0; }
  .identical { text-align: center; padding: 40px; color: #27ae60; font-size: 1.2em; }
  details summary { cursor: pointer; padding: 8px 0; }
  .filter-bar { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-bar label { font-weight: 600; font-size: 0.9em; color: #555; white-space: nowrap; }
  .filter-bar input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
  .filter-bar input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
  .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #f8f9fa; cursor: pointer; font-size: 0.82em; color: #555; transition: all 0.15s; }
  .filter-btn:hover { background: #e8e8e8; }
  .filter-btn.active { background: #3498db; color: white; border-color: #3498db; }
  .hidden-row { display: none; }
  .filter-info { font-size: 0.82em; color: #95a5a6; margin-left: auto; white-space: nowrap; }

  /* Reset button */
  .reset-btn { position: absolute; top: 32px; right: 24px; background: none; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 6px 14px; border-radius: 6px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .reset-btn:hover { background: rgba(255,255,255,0.15); border-color: white; }

  /* Footer */
  .build-footer { text-align: center; padding: 16px; font-size: 0.7em; color: #bdc3c7; }

  /* Report meta */
  .report-meta { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px 20px; margin-bottom: 20px; }
  .report-meta .meta-row { display: flex; gap: 24px; flex-wrap: wrap; font-size: 0.9em; color: #555; }
  .report-meta .meta-row span { white-space: nowrap; }
  .report-meta .meta-row strong { color: #2c3e50; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SAP SuccessFactors Permission Comparer</h1>
    <p>Upload T3 (Pre-Production) and PROD (Production) permission PDFs to compare them server-side.</p>
    <button class="reset-btn" id="resetBtn" style="display:none;" onclick="resetUI()">Reset</button>
  </header>

  <div class="upload-container" id="uploadContainer">
    <div class="upload-box" id="t3Box">
      <div class="upload-icon">&#128196;</div>
      <h3>T3 (Pre-Production)</h3>
      <p>Drop PDF here or click to browse</p>
      <div class="filename" id="t3Name"></div>
      <input type="file" id="t3Input" accept=".pdf">
    </div>
    <div class="upload-box" id="prodBox">
      <div class="upload-icon">&#128196;</div>
      <h3>PROD (Production)</h3>
      <p>Drop PDF here or click to browse</p>
      <div class="filename" id="prodName"></div>
      <input type="file" id="prodInput" accept=".pdf">
    </div>
  </div>

  <div class="actions" id="actionsContainer">
    <button id="compareBtn" disabled>Compare Permissions</button>
  </div>

  <div id="progress"></div>
  <div id="report"></div>
</div>

<footer class="build-footer" id="buildFooter"></footer>

<script>
// ============================================================================
// Upload UI
// ============================================================================
var t3File = null, prodFile = null;

function setupUploadBox(boxId, inputId, nameId, setter) {
  var box = document.getElementById(boxId);
  var input = document.getElementById(inputId);
  var nameEl = document.getElementById(nameId);

  input.addEventListener('change', function() {
    if (input.files.length > 0) {
      setter(input.files[0]);
      nameEl.textContent = input.files[0].name;
      box.classList.add('has-file');
    }
  });

  box.addEventListener('dragover', function(e) { e.preventDefault(); box.classList.add('dragover'); });
  box.addEventListener('dragleave', function() { box.classList.remove('dragover'); });
  box.addEventListener('drop', function(e) {
    e.preventDefault();
    box.classList.remove('dragover');
    var file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      setter(file);
      nameEl.textContent = file.name;
      box.classList.add('has-file');
      var dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
    }
  });
}

setupUploadBox('t3Box', 't3Input', 't3Name', function(f) { t3File = f; updateBtn(); });
setupUploadBox('prodBox', 'prodInput', 'prodName', function(f) { prodFile = f; updateBtn(); });

function updateBtn() {
  document.getElementById('compareBtn').disabled = !(t3File && prodFile);
}

document.getElementById('compareBtn').addEventListener('click', runComparison);

// ============================================================================
// Helpers
// ============================================================================
function htmlEscape(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;')
             .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setProgress(msg) {
  var el = document.getElementById('progress');
  if (msg) {
    el.innerHTML = '<span class="spinner"></span> ' + htmlEscape(msg);
  } else {
    el.innerHTML = '';
  }
}

// ============================================================================
// Report rendering
// ============================================================================
function renderReport(data) {
  var differences = data.differences;
  var rawDiff = data.rawDiff;
  var t3FileName = data.t3FileName;
  var prodFileName = data.prodFileName;
  var timestamp = new Date().toLocaleString();

  var typeLabels = {
    'PERMISSION_MISMATCH':     ['Permission Mismatches', '#e67e22', 'Different rights granted between T3 and PROD'],
    'MISSING_IN_PROD':         ['Only in T3', '#e74c3c', 'Items present in T3 but missing in PROD'],
    'MISSING_IN_T3':           ['Only in PROD', '#2ecc71', 'Items present in PROD but missing in T3'],
    'SECTION_MISSING_IN_PROD': ['Sections only in T3', '#e74c3c', 'Entire sections missing in PROD'],
    'SECTION_MISSING_IN_T3':   ['Sections only in PROD', '#2ecc71', 'Entire sections missing in T3'],
  };

  var counts = {};
  var dtKeys = Object.keys(typeLabels);
  for (var k = 0; k < dtKeys.length; k++) {
    var dt = dtKeys[k];
    counts[dt] = differences.filter(function(d) { return d.type === dt; }).length;
  }

  var onlyT3 = rawDiff.onlyInT3;
  var onlyProd = rawDiff.onlyInProd;

  var html = '';

  // Meta
  html += '<div class="report-meta"><div class="meta-row">' +
    '<span><strong>T3:</strong> ' + htmlEscape(t3FileName) + '</span>' +
    '<span><strong>PROD:</strong> ' + htmlEscape(prodFileName) + '</span>' +
    '<span><strong>Generated:</strong> ' + htmlEscape(timestamp) + '</span>' +
    '</div></div>';

  // Summary cards
  html += '<div class="summary">' +
    '<div class="card" style="border-top-color:#3498db;"><div class="num" id="cardTotal">' + differences.length + '</div><div class="label">Total Differences</div></div>' +
    '<div class="card" style="border-top-color:#e67e22;"><div class="num" id="cardMismatch">' + (counts['PERMISSION_MISMATCH'] || 0) + '</div><div class="label">Mismatches</div></div>' +
    '<div class="card" style="border-top-color:#e74c3c;"><div class="num" id="cardT3">' + ((counts['MISSING_IN_PROD'] || 0) + (counts['SECTION_MISSING_IN_PROD'] || 0)) + '</div><div class="label">Only in T3</div></div>' +
    '<div class="card" style="border-top-color:#2ecc71;"><div class="num" id="cardProd">' + ((counts['MISSING_IN_T3'] || 0) + (counts['SECTION_MISSING_IN_T3'] || 0)) + '</div><div class="label">Only in PROD</div></div>' +
    '</div>';

  // Filter bar
  html += '<div class="filter-bar">' +
    '<label>Filter rows:</label>' +
    '<input type="text" id="filterInput" placeholder="Type to exclude rows containing this text...">' +
    '<button class="filter-btn" data-filter="_SD)" onclick="togglePreset(this)">Hide _SD)</button>' +
    '<button class="filter-btn" onclick="clearFilter()">Clear</button>' +
    '<span class="filter-info" id="filterInfo"></span>' +
    '</div>';

  if (differences.length === 0) {
    html += '<div class="identical">No differences found &mdash; permissions are identical.</div>';
  } else {
    var typeOrder = ['PERMISSION_MISMATCH', 'MISSING_IN_PROD', 'MISSING_IN_T3', 'SECTION_MISSING_IN_PROD', 'SECTION_MISSING_IN_T3'];
    for (var ti = 0; ti < typeOrder.length; ti++) {
      var diffType = typeOrder[ti];
      var typeDiffs = differences.filter(function(d) { return d.type === diffType; });
      if (!typeDiffs.length) continue;

      var info = typeLabels[diffType];
      var label = info[0], color = info[1], desc = info[2];

      html += '<div class="section">' +
        '<div class="section-header" style="background:' + color + ';color:white;">' +
        htmlEscape(label) + ': ' + htmlEscape(desc) +
        '<span class="badge">' + typeDiffs.length + '</span>' +
        '</div>' +
        '<div class="section-body"><table>' +
        '<tr><th>#</th><th>Section</th><th>Item</th><th>T3</th><th>PROD</th></tr>';

      for (var di = 0; di < typeDiffs.length; di++) {
        var diff = typeDiffs[di];
        html += '<tr>' +
          '<td>' + (di + 1) + '</td>' +
          '<td>' + htmlEscape(diff.section) + '</td>' +
          '<td>' + htmlEscape(diff.item) + '</td>' +
          '<td><span class="tag tag-t3">' + htmlEscape(diff.t3Value) + '</span></td>' +
          '<td><span class="tag tag-prod">' + htmlEscape(diff.prodValue) + '</span></td>' +
          '</tr>';
      }

      html += '</table></div></div>';
    }
  }

  // Raw differences
  if (onlyT3.length || onlyProd.length) {
    html += '<div class="section">' +
      '<div class="section-header" style="background:#95a5a6;color:white;">' +
      'Raw Line Differences (Supplementary)' +
      '<span class="badge">' + (onlyT3.length + onlyProd.length) + '</span>' +
      '</div>' +
      '<div class="raw-section">';

    if (onlyT3.length) {
      html += '<details><summary><strong>Lines only in T3 (' + onlyT3.length + ')</strong></summary>';
      for (var ri = 0; ri < onlyT3.length; ri++) {
        html += '<div class="raw-line raw-t3">' + htmlEscape(onlyT3[ri]) + '</div>';
      }
      html += '</details>';
    }
    if (onlyProd.length) {
      html += '<details><summary><strong>Lines only in PROD (' + onlyProd.length + ')</strong></summary>';
      for (var rj = 0; rj < onlyProd.length; rj++) {
        html += '<div class="raw-line raw-prod">' + htmlEscape(onlyProd[rj]) + '</div>';
      }
      html += '</details>';
    }

    html += '</div></div>';
  }

  return html;
}

// ============================================================================
// Main comparison flow
// ============================================================================
function runComparison() {
  var btn = document.getElementById('compareBtn');
  var reportEl = document.getElementById('report');
  btn.disabled = true;
  reportEl.innerHTML = '';

  setProgress('Uploading and comparing PDFs...');

  var formData = new FormData();
  formData.append('t3', t3File);
  formData.append('prod', prodFile);

  fetch('/api/compare', {
    method: 'POST',
    body: formData,
  })
  .then(function(response) {
    if (!response.ok) {
      return response.text().then(function(text) {
        throw new Error('Server error (' + response.status + '): ' + text);
      });
    }
    return response.json();
  })
  .then(function(data) {
    setProgress('');
    var reportHtml = renderReport(data);
    reportEl.innerHTML = reportHtml;

    // Hide upload UI, show reset
    document.getElementById('uploadContainer').style.display = 'none';
    document.getElementById('actionsContainer').style.display = 'none';
    document.getElementById('resetBtn').style.display = '';

    attachFilterLogic();
  })
  .catch(function(err) {
    setProgress('');
    reportEl.innerHTML = '<div class="section" style="padding:24px;color:#e74c3c;">' +
      '<strong>Error:</strong> ' + htmlEscape(err.message) + '</div>';
  })
  .finally(function() {
    btn.disabled = false;
  });
}

// ============================================================================
// Filter logic
// ============================================================================
function attachFilterLogic() {
  var filterInput = document.getElementById('filterInput');
  if (!filterInput) return;
  filterInput.addEventListener('input', applyFilter);
}

function applyFilter() {
  var filterInput = document.getElementById('filterInput');
  var filterInfo = document.getElementById('filterInfo');
  if (!filterInput) return;

  var term = filterInput.value.trim().toLowerCase();
  var rows = document.querySelectorAll('.section-body table tr:not(:first-child)');
  var hidden = 0, total = 0;

  rows.forEach(function(row) {
    total++;
    var text = row.textContent.toLowerCase();
    if (term && text.indexOf(term) >= 0) {
      row.classList.add('hidden-row');
      hidden++;
    } else {
      row.classList.remove('hidden-row');
    }
  });

  // Update badge counts and summary cards
  var totalVisible = 0, mismatchVisible = 0, t3OnlyVisible = 0, prodOnlyVisible = 0;
  document.querySelectorAll('.section').forEach(function(sec) {
    var tbl = sec.querySelector('table');
    if (!tbl) return;
    var visible = tbl.querySelectorAll('tr:not(:first-child):not(.hidden-row)').length;
    var badge = sec.querySelector('.badge');
    if (badge) badge.textContent = visible;
    var hdr = sec.querySelector('.section-header');
    if (!hdr) return;
    var txt = hdr.textContent.toLowerCase();
    totalVisible += visible;
    if (txt.indexOf('mismatch') >= 0) mismatchVisible += visible;
    else if (txt.indexOf('only in t3') >= 0) t3OnlyVisible += visible;
    else if (txt.indexOf('only in prod') >= 0) prodOnlyVisible += visible;
  });

  var ct = document.getElementById('cardTotal');
  var cm = document.getElementById('cardMismatch');
  var c3 = document.getElementById('cardT3');
  var cp = document.getElementById('cardProd');
  if (ct) ct.textContent = totalVisible;
  if (cm) cm.textContent = mismatchVisible;
  if (c3) c3.textContent = t3OnlyVisible;
  if (cp) cp.textContent = prodOnlyVisible;

  if (filterInfo) filterInfo.textContent = term ? 'Hiding ' + hidden + ' of ' + total + ' rows' : '';
}

function togglePreset(btn) {
  var filter = btn.dataset.filter;
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    document.getElementById('filterInput').value = '';
  } else {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('filterInput').value = filter;
  }
  applyFilter();
}

function clearFilter() {
  document.getElementById('filterInput').value = '';
  document.querySelectorAll('.filter-btn[data-filter]').forEach(function(b) { b.classList.remove('active'); });
  applyFilter();
}

function resetUI() {
  document.getElementById('uploadContainer').style.display = '';
  document.getElementById('actionsContainer').style.display = '';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('report').innerHTML = '';
  t3File = null;
  prodFile = null;
  document.getElementById('t3Input').value = '';
  document.getElementById('prodInput').value = '';
  document.getElementById('t3Name').textContent = '';
  document.getElementById('prodName').textContent = '';
  document.getElementById('t3Box').classList.remove('has-file');
  document.getElementById('prodBox').classList.remove('has-file');
  document.getElementById('compareBtn').disabled = true;
}

// Load build info
fetch('/api/info').then(function(r) { return r.json(); }).then(function(d) {
  if (d.buildDate && d.buildDate !== 'unknown') {
    document.getElementById('buildFooter').textContent = 'Built: ' + d.buildDate;
  }
}).catch(function() {});
</script>
</body>
</html>
